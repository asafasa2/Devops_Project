# Logstash pipeline configuration for DevOps Practice Environment

input {
  # Beats input for log collection
  beats {
    port => 5044
  }
  
  # Docker logs via syslog
  syslog {
    port => 5000
    type => "docker"
  }
  
  # Application logs via TCP
  tcp {
    port => 5001
    type => "application"
    codec => json_lines
  }
}

filter {
  # Parse Docker container logs
  if [type] == "docker" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{WORD:container_name} %{GREEDYDATA:log_message}" }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
    }
    
    mutate {
      add_field => { "log_source" => "docker" }
    }
  }
  
  # Parse application logs
  if [type] == "application" {
    if [service] {
      mutate {
        add_field => { "log_source" => "application" }
        add_field => { "service_name" => "%{service}" }
      }
    }
    
    # Parse different log levels
    if [level] {
      mutate {
        add_field => { "log_level" => "%{level}" }
      }
    }
    
    # Parse timestamps
    if [timestamp] {
      date {
        match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      }
    }
  }
  
  # Parse Nginx access logs
  if [service] == "nginx" {
    grok {
      match => { "message" => "%{NGINXACCESS}" }
    }
    
    mutate {
      add_field => { "log_source" => "nginx" }
    }
    
    if [response] {
      mutate {
        convert => { "response" => "integer" }
      }
    }
  }
  
  # Parse API Gateway logs
  if [service] == "api-gateway" {
    if [message] =~ /^\{.*\}$/ {
      json {
        source => "message"
      }
    }
    
    mutate {
      add_field => { "log_source" => "api-gateway" }
    }
  }
  
  # Parse microservice logs
  if [service] in ["user-service", "learning-service", "assessment-service", "lab-service"] {
    if [message] =~ /^\{.*\}$/ {
      json {
        source => "message"
      }
    }
    
    mutate {
      add_field => { "log_source" => "microservice" }
    }
  }
  
  # Add common fields
  mutate {
    add_field => { "environment" => "${ENVIRONMENT:dev}" }
    add_field => { "platform" => "devops-practice" }
  }
  
  # Remove unnecessary fields
  mutate {
    remove_field => [ "host", "agent", "ecs", "input" ]
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "devops-practice-logs-%{+YYYY.MM.dd}"
    template_name => "devops-practice"
    template_pattern => "devops-practice-*"
    template => {
      "index_patterns" => ["devops-practice-*"]
      "settings" => {
        "number_of_shards" => 1
        "number_of_replicas" => 0
        "index.refresh_interval" => "5s"
      }
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" }
          "message" => { "type" => "text" }
          "log_level" => { "type" => "keyword" }
          "service_name" => { "type" => "keyword" }
          "log_source" => { "type" => "keyword" }
          "environment" => { "type" => "keyword" }
          "platform" => { "type" => "keyword" }
        }
      }
    }
  }
  
  # Debug output (optional)
  # stdout { codec => rubydebug }
}