# Grafana configuration for DevOps Practice Environment
[server]
http_port = 3000
domain = localhost
root_url = http://localhost:3000

[security]
admin_user = admin
admin_password = ${GF_SECURITY_ADMIN_PASSWORD:-admin123}
secret_key = ${GF_SECURITY_SECRET_KEY:-SW2YcwTIb9zpOOhoPsMm}

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/system-overview.json

[log]
mode = console
level = info

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning