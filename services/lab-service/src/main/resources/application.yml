server:
  port: 4003

spring:
  application:
    name: lab-service
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/devops_learning}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:default-jwt-secret}

docker:
  host: ${DOCKER_HOST:unix:///var/run/docker.sock}

lab:
  max-sessions-per-user: ${LAB_MAX_SESSIONS:3}
  session-timeout-hours: ${LAB_SESSION_TIMEOUT:2}
  network:
    name: ${LAB_NETWORK_NAME:lab-network}

logging:
  level:
    com.devopslearning.labservice: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"