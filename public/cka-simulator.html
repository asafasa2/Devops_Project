<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKA Practice Exam Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #ffffff;
            overflow: hidden;
        }
        
        .exam-container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 300px;
            background: #2d2d30;
            border-right: 1px solid #3e3e42;
            overflow-y: auto;
        }
        
        .exam-header {
            padding: 20px;
            background: #007acc;
            color: white;
            text-align: center;
        }
        
        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .progress {
            font-size: 0.9rem;
        }
        
        .task-list {
            padding: 20px;
        }
        
        .task-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #3c3c3c;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            border-left: 4px solid #666;
        }
        
        .task-item:hover {
            background: #4a4a4a;
        }
        
        .task-item.active {
            background: #007acc;
            border-left-color: #ffffff;
        }
        
        .task-item.completed {
            border-left-color: #4CAF50;
            background: #2d4a2d;
        }
        
        .task-number {
            font-weight: bold;
            color: #007acc;
        }
        
        .task-item.active .task-number {
            color: white;
        }
        
        .task-points {
            float: right;
            color: #ffa500;
            font-size: 0.9rem;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .task-header {
            padding: 20px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
        }
        
        .task-title {
            font-size: 1.3rem;
            color: #007acc;
            margin-bottom: 10px;
        }
        
        .context-info {
            background: #3c3c3c;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }
        
        .task-description {
            background: #2d2d30;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .terminal-container {
            flex: 1;
            background: #000;
            border-radius: 5px;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            cursor: text;
        }
        
        .terminal-container:focus-within {
            outline: 2px solid #007acc;
        }
        
        .terminal-output {
            color: #00ff00;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }
        
        .command-line {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .prompt {
            color: #00ff00;
            margin-right: 10px;
        }
        
        .command-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            caret-color: #00ff00;
        }
        
        .command-input:focus {
            outline: none;
        }
        
        .task-controls {
            padding: 20px;
            background: #2d2d30;
            border-top: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .btn-primary {
            background: #007acc;
            color: white;
        }
        
        .btn-primary:hover {
            background: #005a9e;
        }
        
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        
        .btn-success:hover {
            background: #45a049;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .context-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .context-btn {
            padding: 8px 15px;
            background: #3c3c3c;
            border: none;
            color: white;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .context-btn.active {
            background: #007acc;
        }
        
        .context-btn:hover {
            background: #4a4a4a;
        }
        
        .context-btn.active:hover {
            background: #005a9e;
        }
        
        .file-editor {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        
        .file-editor.active {
            display: block;
        }
        
        .file-editor textarea {
            width: 100%;
            height: 200px;
            background: #000;
            color: #00ff00;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
        }
        
        .file-path {
            color: #ffa500;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>

    <script>
        // CKA Practice Exam Tasks
        const examTasks = [
            {
                id: 1,
                title: "Kubeconfig Information Extraction",
                points: 4,
                context: "ssh cka9412",
                description: `You're asked to extract the following information out of kubeconfig file /opt/course/1/kubeconfig on cka9412:

• Write all kubeconfig context names into /opt/course/1/contexts, one per line
• Write the name of the current context into /opt/course/1/current-context  
• Write the client-certificate of user account-0027 base64-decoded into /opt/course/1/cert`,
                solution: [
                    "kubectl config view --kubeconfig=/opt/course/1/kubeconfig -o jsonpath='{.contexts[*].name}' | tr ' ' '\\n' > /opt/course/1/contexts",
                    "kubectl config view --kubeconfig=/opt/course/1/kubeconfig -o jsonpath='{.current-context}' > /opt/course/1/current-context",
                    "kubectl config view --kubeconfig=/opt/course/1/kubeconfig -o jsonpath='{.users[?(@.name==\"account-0027\")].user.client-certificate-data}' | base64 -d > /opt/course/1/cert"
                ]
            },
            {
                id: 2,
                title: "MinIO Operator Installation",
                points: 6,
                context: "ssh cka7968",
                description: `Install the MinIO Operator using Helm in Namespace minio. Then configure and create the Tenant CRD:

• Create Namespace minio
• Install Helm chart minio/operator into the new Namespace. The Helm Release should be called minio-operator
• Update the Tenant resource in /opt/course/2/minio-tenant.yaml to include enableSFTP: true under features
• Create the Tenant resource from /opt/course/2/minio-tenant.yaml`,
                solution: [
                    "kubectl create namespace minio",
                    "helm repo add minio https://operator.min.io/",
                    "helm install minio-operator minio/operator -n minio",
                    "# Edit /opt/course/2/minio-tenant.yaml to add enableSFTP: true",
                    "kubectl apply -f /opt/course/2/minio-tenant.yaml"
                ]
            },
            {
                id: 3,
                title: "Scale Down Pods",
                points: 3,
                context: "ssh cka3962",
                description: `There are two Pods named o3db-* in Namespace project-h800. The Project H800 management asked you to scale these down to one replica to save resources.`,
                solution: [
                    "kubectl get pods -n project-h800 | grep o3db",
                    "kubectl get deployment -n project-h800",
                    "kubectl scale deployment o3db-deployment --replicas=1 -n project-h800"
                ]
            },
            {
                id: 4,
                title: "HorizontalPodAutoscaler Setup",
                points: 8,
                context: "ssh cka5774",
                description: `Previously the application api-gateway used some external autoscaler which should now be replaced with a HorizontalPodAutoscaler (HPA). The application has been deployed to Namespaces api-gateway-staging and api-gateway-prod.

Using the Kustomize config at /opt/course/5/api-gateway do the following:
• Remove the ConfigMap horizontal-scaling-config completely
• Add HPA named api-gateway for the Deployment api-gateway with min 2 and max 4 replicas. It should scale at 50% average CPU utilisation
• In prod the HPA should have max 6 replicas
• Apply your changes for staging and prod so they're reflected in the cluster`,
                solution: [
                    "cd /opt/course/5/api-gateway",
                    "# Remove ConfigMap from kustomization.yaml",
                    "# Create HPA resource files",
                    "kubectl kustomize staging | kubectl apply -f -",
                    "kubectl kustomize prod | kubectl apply -f -"
                ]
            },
            {
                id: 5,
                title: "PersistentVolume and PVC",
                points: 5,
                context: "ssh cka9412",
                description: `Create a new PersistentVolume named safari-pv. It should have a capacity of 2Gi, accessMode ReadWriteOnce, hostPath /Volumes/Data and no storageClassName defined.

Next create a new PersistentVolumeClaim in Namespace project-t230 named safari-pvc. It should request 2Gi storage, accessMode ReadWriteOnce and should not define a storageClassName. The PVC should bound to the PV correctly.

Finally create a new Deployment safari in Namespace project-t230 which mounts that volume at /tmp/safari-data. The Pods of that Deployment should be of image httpd:2-alpine.`,
                solution: [
                    "# Create PV YAML",
                    "kubectl apply -f pv.yaml",
                    "kubectl create namespace project-t230",
                    "# Create PVC YAML", 
                    "kubectl apply -f pvc.yaml -n project-t230",
                    "# Create Deployment YAML with volume mount",
                    "kubectl apply -f deployment.yaml -n project-t230"
                ]
            }
        ];
        
        let currentTaskIndex = 0;
        let completedTasks = new Set();
        let examStartTime = Date.now();
        let examDuration = 2 * 60 * 60 * 1000; // 2 hours in milliseconds
        
        // Initialize exam
        function initializeExam() {
            populateTaskList();
            loadTask(0);
            startTimer();
        }
        
        function populateTaskList() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';
            
            examTasks.forEach((task, index) => {
                const taskItem = document.createElement('div');
                taskItem.className = `task-item ${index === currentTaskIndex ? 'active' : ''} ${completedTasks.has(index) ? 'completed' : ''}`;
                taskItem.onclick = () => loadTask(index);
                
                taskItem.innerHTML = `
                    <div class="task-number">Task ${task.id}</div>
                    <div class="task-points">${task.points} pts</div>
                    <div style="clear: both; margin-top: 5px; font-size: 0.9rem;">${task.title}</div>
                `;
                
                taskList.appendChild(taskItem);
            });
        }
        
        function loadTask(index) {
            if (index < 0 || index >= examTasks.length) return;
            
            currentTaskIndex = index;
            const task = examTasks[index];
            
            document.getElementById('taskTitle').textContent = `Task ${task.id}: ${task.title}`;
            document.getElementById('currentContext').textContent = task.context;
            document.getElementById('taskDescription').innerHTML = task.description.replace(/\n/g, '<br>');
            document.getElementById('prompt').textContent = `root@${task.context.split(' ')[1]}:~#`;
            
            populateTaskList();
            switchContext('terminal');
        }
        
        function switchContext(context) {
            // Hide all views
            document.getElementById('terminalView').style.display = 'none';
            document.getElementById('filesView').style.display = 'none';
            document.getElementById('notesView').style.display = 'none';
            
            // Remove active class from all buttons
            document.querySelectorAll('.context-btn').forEach(btn => btn.classList.remove('active'));
            
            // Show selected view and activate button
            if (context === 'terminal') {
                document.getElementById('terminalView').style.display = 'block';
                document.querySelector('[onclick="switchContext(\'terminal\')"]').classList.add('active');
                setTimeout(() => document.getElementById('commandInput').focus(), 100);
            } else if (context === 'files') {
                document.getElementById('filesView').style.display = 'block';
                document.querySelector('[onclick="switchContext(\'files\')"]').classList.add('active');
            } else if (context === 'notes') {
                document.getElementById('notesView').style.display = 'block';
                document.querySelector('[onclick="switchContext(\'notes\')"]').classList.add('active');
                document.getElementById('notesArea').focus();
            }
        }
        
        // Keep terminal focused when clicking in terminal area
        function focusTerminal() {
            document.getElementById('commandInput').focus();
        }
        
        // Enhanced terminal state management
        let currentDirectory = '/root';
        let commandHistory = [];
        let historyIndex = -1;
        let tabCompletionCache = {};
        
        // Kubernetes cluster simulation data
        const clusterData = {
            namespaces: ['default', 'kube-system', 'kube-public', 'kube-node-lease', 'project-h800', 'project-t230', 'minio', 'api-gateway-staging', 'api-gateway-prod'],
            pods: {
                'default': ['nginx-deployment-abc123-xyz', 'test-pod-456'],
                'project-h800': ['o3db-deployment-789-abc', 'o3db-deployment-789-def', 'web-server-123'],
                'kube-system': ['coredns-558bd4d5db-abc', 'etcd-master', 'kube-apiserver-master', 'kube-controller-manager-master', 'kube-proxy-xyz', 'kube-scheduler-master'],
                'minio': ['minio-operator-abc123', 'minio-tenant-pool-0-0'],
                'api-gateway-staging': ['api-gateway-staging-abc', 'api-gateway-staging-def'],
                'api-gateway-prod': ['api-gateway-prod-abc', 'api-gateway-prod-def', 'api-gateway-prod-ghi']
            },
            deployments: {
                'default': ['nginx-deployment'],
                'project-h800': ['o3db-deployment', 'web-server'],
                'api-gateway-staging': ['api-gateway'],
                'api-gateway-prod': ['api-gateway']
            },
            services: {
                'default': ['kubernetes'],
                'kube-system': ['kube-dns'],
                'project-h800': ['o3db-service', 'web-service'],
                'api-gateway-staging': ['api-gateway-svc'],
                'api-gateway-prod': ['api-gateway-svc']
            },
            nodes: ['master', 'worker1', 'worker2']
        };
        
        // File system simulation
        const fileSystem = {
            '/root': ['Documents', 'Downloads', 'opt'],
            '/root/Documents': [],
            '/root/Downloads': [],
            '/opt': ['course'],
            '/opt/course': ['1', '2', '3', '4', '5'],
            '/opt/course/1': ['kubeconfig', 'contexts', 'current-context', 'cert'],
            '/opt/course/2': ['minio-tenant.yaml'],

        };
        
        function handleCommand(event) {
            const input = event.target;
            
            if (event.key === 'Enter') {
                const command = input.value.trim();
                if (command) {
                    commandHistory.unshift(command);
                    if (commandHistory.length > 100) commandHistory.pop();
                }
                historyIndex = -1;
                
                const output = document.getElementById('terminalOutput');
                const prompt = document.getElementById('prompt').textContent;
                
                // Add command to output
                output.innerHTML += `${prompt} ${command}\n`;
                
                // Process command
                const response = processCommand(command);
                if (response) {
                    output.innerHTML += response + '\n';
                }
                output.innerHTML += '\n';
                
                // Clear input and scroll to bottom
                input.value = '';
                output.scrollTop = output.scrollHeight;
                
            } else if (event.key === 'Tab') {
                event.preventDefault();
                handleTabCompletion(input);
                
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    input.value = commandHistory[historyIndex];
                }
                
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = commandHistory[historyIndex];
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    input.value = '';
                }
            }
        }
        
        function handleTabCompletion(input) {
            const command = input.value;
            const parts = command.split(' ');
            const lastPart = parts[parts.length - 1];
            
            let completions = [];
            
            // Command completion
            if (parts.length === 1) {
                const commands = ['kubectl', 'helm', 'ls', 'cd', 'pwd', 'cat', 'echo', 'grep', 'base64', 'tr', 'mkdir', 'touch', 'rm', 'cp', 'mv', 'nano', 'vi', 'clear', 'history', 'help'];
                completions = commands.filter(cmd => cmd.startsWith(lastPart));
            }
            
            // kubectl subcommand completion
            else if (parts[0] === 'kubectl') {
                if (parts.length === 2) {
                    const subcommands = ['get', 'describe', 'create', 'delete', 'apply', 'config', 'logs', 'exec', 'port-forward', 'scale', 'rollout', 'top', 'explain'];
                    completions = subcommands.filter(cmd => cmd.startsWith(lastPart));
                } else if (parts[1] === 'get' && parts.length === 3) {
                    const resources = ['pods', 'deployments', 'services', 'nodes', 'namespaces', 'configmaps', 'secrets', 'pv', 'pvc', 'hpa'];
                    completions = resources.filter(res => res.startsWith(lastPart));
                } else if (parts[1] === 'config' && parts.length === 3) {
                    const configCommands = ['view', 'get-contexts', 'current-context', 'use-context', 'set-context'];
                    completions = configCommands.filter(cmd => cmd.startsWith(lastPart));
                }
            }
            
            // File path completion
            else if (parts[0] === 'ls' || parts[0] === 'cd' || parts[0] === 'cat') {
                const path = lastPart.startsWith('/') ? lastPart : currentDirectory + '/' + lastPart;
                const dir = path.substring(0, path.lastIndexOf('/')) || '/';
                const prefix = path.substring(path.lastIndexOf('/') + 1);
                
                if (fileSystem[dir]) {
                    completions = fileSystem[dir]
                        .filter(item => item.startsWith(prefix))
                        .map(item => lastPart.startsWith('/') ? dir + '/' + item : item);
                }
            }
            
            // Apply completion
            if (completions.length === 1) {
                const newCommand = parts.slice(0, -1).concat(completions[0]).join(' ');
                input.value = newCommand + ' ';
            } else if (completions.length > 1) {
                // Show available completions
                const output = document.getElementById('terminalOutput');
                output.innerHTML += completions.join('  ') + '\n';
                output.scrollTop = output.scrollHeight;
            }

            setInterval(() => {
                const elapsed = Date.now() - examStartTime;
                const remaining = Math.max(0, examDuration - elapsed);
                
                const hours = Math.floor(remaining / (1000 * 60 * 60));
                const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
                
                document.getElementById('timer').textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (remaining === 0) {
                    alert('Time is up! Exam completed.');
                }
            }, 1000);
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            initializeExam();
            // Focus terminal input after a short delay
            setTimeout(() => {
                document.getElementById('commandInput').focus();
            }, 500);
        });
    </script>
</body>
</html>
