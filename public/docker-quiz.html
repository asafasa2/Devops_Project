<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Fundamentals Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0db7ed 0%, #0a5d7a 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .quiz-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .quiz-header h1 {
            color: #0db7ed;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        
        .quiz-info {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0db7ed;
        }
        
        .info-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .question-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .question-number {
            background: #0db7ed;
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            font-weight: bold;
        }
        
        .question-progress {
            color: #666;
            font-size: 0.9rem;
        }
        
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #333;
        }
        
        .options {
            list-style: none;
        }
        
        .option {
            margin-bottom: 15px;
        }
        
        .option label {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .option label:hover {
            background: #e8f4fd;
            border-color: #0db7ed;
        }
        
        .option input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
        }
        
        .option.correct label {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        
        .option.incorrect label {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        
        .option.selected label {
            background: #cce7ff;
            border-color: #0db7ed;
        }
        
        .explanation {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .explanation.show {
            display: block;
        }
        
        .explanation h4 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .explanation p {
            color: #856404;
            line-height: 1.6;
        }
        
        .quiz-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: #0db7ed;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0a5d7a;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }
        
        .results-card.show {
            display: block;
        }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }
        
        .score-pass {
            background: linear-gradient(135deg, #28a745, #20c997);
        }
        
        .score-fail {
            background: linear-gradient(135deg, #dc3545, #fd7e14);
        }
        
        .results-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .result-item {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
        }
        
        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0db7ed;
        }
        
        .result-label {
            color: #666;
            margin-top: 5px;
        }
        
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="timer" id="timer">10:00</div>
    
    <div class="quiz-container">
        <a href="learning-docker.html" class="back-link">← Back to Docker Learning Path</a>
        
        <div class="quiz-header">
            <h1>🐳 Docker Fundamentals Quiz</h1>
            <p>Test your understanding of Docker containerization concepts and commands</p>
            
            <div class="quiz-info">
                <div class="info-item">
                    <div class="info-value">5</div>
                    <div class="info-label">Questions</div>
                </div>
                <div class="info-item">
                    <div class="info-value">10</div>
                    <div class="info-label">Minutes</div>
                </div>
                <div class="info-item">
                    <div class="info-value">80%</div>
                    <div class="info-label">Pass Score</div>
                </div>
            </div>
        </div>
        
        <div id="quizContent">
            <!-- Questions will be populated by JavaScript -->
        </div>
        
        <div class="results-card" id="resultsCard">
            <h2>Quiz Complete!</h2>
            <div class="score-circle" id="scoreCircle">
                <span id="finalScore">0%</span>
            </div>
            <h3 id="resultMessage">Great job!</h3>
            
            <div class="results-details">
                <div class="result-item">
                    <div class="result-value" id="correctAnswers">0</div>
                    <div class="result-label">Correct Answers</div>
                </div>
                <div class="result-item">
                    <div class="result-value" id="totalTime">0:00</div>
                    <div class="result-label">Time Taken</div>
                </div>
                <div class="result-item">
                    <div class="result-value" id="accuracy">0%</div>
                    <div class="result-label">Accuracy</div>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <button class="btn btn-primary" onclick="restartQuiz()">Retake Quiz</button>
                <button class="btn btn-secondary" onclick="window.location.href='learning-docker.html'">Back to Learning</button>
            </div>
        </div>
    </div>
    
    <script>
        // Docker Quiz Questions
        const quizQuestions = [
            {
                question: "What is the main difference between containers and virtual machines?",
                options: [
                    "Containers are slower to start",
                    "Containers share the host OS kernel",
                    "Containers require more resources",
                    "Containers provide better isolation"
                ],
                correct: 1,
                explanation: "Containers share the host operating system kernel, making them lightweight and fast to start compared to VMs which require a full guest OS."
            },
            {
                question: "Which command is used to download a Docker image from a registry?",
                options: [
                    "docker get",
                    "docker pull",
                    "docker download",
                    "docker fetch"
                ],
                correct: 1,
                explanation: "The 'docker pull' command downloads an image from a Docker registry like Docker Hub to your local machine."
            },
            {
                question: "What does the 'docker ps' command show?",
                options: [
                    "All Docker images",
                    "Running containers only",
                    "All containers",
                    "Docker processes"
                ],
                correct: 1,
                explanation: "'docker ps' shows only running containers. Use 'docker ps -a' to see all containers including stopped ones."
            },
            {
                question: "Which Dockerfile instruction sets the base image?",
                options: [
                    "BASE",
                    "FROM",
                    "IMAGE",
                    "PARENT"
                ],
                correct: 1,
                explanation: "The FROM instruction specifies the base image that your Docker image will be built upon. It's typically the first instruction in a Dockerfile."
            },
            {
                question: "What is the purpose of the EXPOSE instruction in a Dockerfile?",
                options: [
                    "Opens ports on the host",
                    "Documents which ports the container uses",
                    "Automatically publishes ports",
                    "Blocks network access"
                ],
                correct: 1,
                explanation: "EXPOSE documents which ports the container listens on but does not actually publish them. You need the -p flag with 'docker run' to publish ports."
            }
        ];
        
        let currentQuestion = 0;
        let userAnswers = [];
        let quizStartTime = Date.now();
        let timerInterval;
        let timeLimit = 10 * 60; // 10 minutes in seconds
        
        function initializeQuiz() {
            startTimer();
            displayQuestion();
        }
        
        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - quizStartTime) / 1000);
                const remaining = Math.max(0, timeLimit - elapsed);
                
                const minutes = Math.floor(remaining / 60);
                const seconds = remaining % 60;
                
                document.getElementById('timer').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (remaining === 0) {
                    finishQuiz();
                }
            }, 1000);
        }
        
        function displayQuestion() {
            const quizContent = document.getElementById('quizContent');
            
            if (currentQuestion >= quizQuestions.length) {
                finishQuiz();
                return;
            }
            
            const question = quizQuestions[currentQuestion];
            
            quizContent.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <div class="question-number">Question ${currentQuestion + 1}</div>
                        <div class="question-progress">${currentQuestion + 1} of ${quizQuestions.length}</div>
                    </div>
                    
                    <div class="question-text">${question.question}</div>
                    
                    <ul class="options">
                        ${question.options.map((option, index) => `
                            <li class="option">
                                <label>
                                    <input type="radio" name="answer" value="${index}" onchange="selectAnswer(${index})">
                                    ${option}
                                </label>
                            </li>
                        `).join('')}
                    </ul>
                    
                    <div class="explanation" id="explanation">
                        <h4>Explanation:</h4>
                        <p>${question.explanation}</p>
                    </div>
                    
                    <div class="quiz-controls">
                        <button class="btn btn-secondary" onclick="previousQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>
                            ← Previous
                        </button>
                        <div>
                            <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>
                                Submit Answer
                            </button>
                            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display: none;">
                                ${currentQuestion === quizQuestions.length - 1 ? 'Finish Quiz' : 'Next →'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            // Restore previous answer if exists
            if (userAnswers[currentQuestion] !== undefined) {
                const radio = document.querySelector(`input[value="${userAnswers[currentQuestion]}"]`);
                if (radio) {
                    radio.checked = true;
                    selectAnswer(userAnswers[currentQuestion]);
                }
            }
        }
        
        function selectAnswer(answerIndex) {
            userAnswers[currentQuestion] = answerIndex;
            document.getElementById('submitBtn').disabled = false;
            
            // Visual feedback
            document.querySelectorAll('.option').forEach(option => {
                option.classList.remove('selected');
            });
            document.querySelectorAll('.option')[answerIndex].classList.add('selected');
        }
        
        function submitAnswer() {
            const question = quizQuestions[currentQuestion];
            const selectedAnswer = userAnswers[currentQuestion];
            
            // Show correct/incorrect feedback
            document.querySelectorAll('.option').forEach((option, index) => {
                const radio = option.querySelector('input');
                radio.disabled = true;
                
                if (index === question.correct) {
                    option.classList.add('correct');
                } else if (index === selectedAnswer && index !== question.correct) {
                    option.classList.add('incorrect');
                }
            });
            
            // Show explanation
            document.getElementById('explanation').classList.add('show');
            
            // Update controls
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-block';
        }
        
        function nextQuestion() {
            currentQuestion++;
            displayQuestion();
        }
        
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }
        
        function finishQuiz() {
            clearInterval(timerInterval);
            
            // Calculate results
            let correctCount = 0;
            quizQuestions.forEach((question, index) => {
                if (userAnswers[index] === question.correct) {
                    correctCount++;
                }
            });
            
            const percentage = Math.round((correctCount / quizQuestions.length) * 100);
            const timeTaken = Math.floor((Date.now() - quizStartTime) / 1000);
            const minutes = Math.floor(timeTaken / 60);
            const seconds = timeTaken % 60;
            
            // Show results
            document.getElementById('quizContent').style.display = 'none';
            const resultsCard = document.getElementById('resultsCard');
            resultsCard.classList.add('show');
            
            // Update results display
            document.getElementById('finalScore').textContent = `${percentage}%`;
            document.getElementById('correctAnswers').textContent = `${correctCount}/${quizQuestions.length}`;
            document.getElementById('totalTime').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('accuracy').textContent = `${percentage}%`;
            
            const scoreCircle = document.getElementById('scoreCircle');
            const resultMessage = document.getElementById('resultMessage');
            
            if (percentage >= 80) {
                scoreCircle.classList.add('score-pass');
                resultMessage.textContent = 'Excellent! You passed the quiz!';
                resultMessage.style.color = '#28a745';
            } else {
                scoreCircle.classList.add('score-fail');
                resultMessage.textContent = 'Keep studying! You can retake the quiz.';
                resultMessage.style.color = '#dc3545';
            }
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            userAnswers = [];
            quizStartTime = Date.now();
            
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('resultsCard').classList.remove('show');
            document.getElementById('scoreCircle').className = 'score-circle';
            
            clearInterval(timerInterval);
            startTimer();
            displayQuestion();
        }
        
        // Initialize quiz when page loads
        document.addEventListener('DOMContentLoaded', initializeQuiz);
    </script>
</body>
</html>
