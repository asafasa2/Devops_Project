# Staging environment inventory
all:
  children:
    web_servers:
      hosts:
        staging-web-01:
          ansible_host: staging-web-frontend
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/frontend
          container_tag: staging
          container_network: devops-practice-frontend
          container_ports:
            - "3000:3000"
          health_check_url: http://localhost:3000/health
    
    app_servers:
      hosts:
        staging-api-01:
          ansible_host: staging-api-gateway
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/api-gateway
          container_tag: staging
          container_network: devops-practice-backend
          container_ports:
            - "4000:4000"
          health_check_url: http://localhost:4000/health
          
        staging-learning-01:
          ansible_host: staging-learning-service
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/learning-service
          container_tag: staging
          container_network: devops-practice-backend
          container_ports:
            - "4001:4001"
          health_check_url: http://localhost:4001/health
          
        staging-user-01:
          ansible_host: staging-user-service
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/user-service
          container_tag: staging
          container_network: devops-practice-backend
          container_ports:
            - "4002:4002"
          health_check_url: http://localhost:4002/health
          
        staging-lab-01:
          ansible_host: staging-lab-service
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/lab-service
          container_tag: staging
          container_network: devops-practice-backend
          container_ports:
            - "4003:4003"
          health_check_url: http://localhost:4003/health
          
        staging-assessment-01:
          ansible_host: staging-assessment-service
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/assessment-service
          container_tag: staging
          container_network: devops-practice-backend
          container_ports:
            - "4004:4004"
          health_check_url: http://localhost:4004/health
    
    db_servers:
      hosts:
        staging-postgres-01:
          ansible_host: staging-postgres
          ansible_connection: docker
          ansible_user: postgres
          container_image: postgres
          container_tag: "15-alpine"
          container_network: devops-practice-database
          container_ports:
            - "5432:5432"
          container_env:
            POSTGRES_DB: devops_practice_staging
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: "{{ vault_postgres_password }}"
            
        staging-redis-01:
          ansible_host: staging-redis
          ansible_connection: docker
          ansible_user: root
          container_image: redis
          container_tag: "7-alpine"
          container_network: devops-practice-database
          container_ports:
            - "6379:6379"
    
    monitoring:
      hosts:
        staging-jenkins-01:
          ansible_host: staging-jenkins
          ansible_connection: docker
          ansible_user: jenkins
          container_image: jenkins/jenkins
          container_tag: lts
          container_network: devops-practice-monitoring
          container_ports:
            - "8080:8080"
            - "50000:50000"
          health_check_url: http://localhost:8080/login
          
        staging-grafana-01:
          ansible_host: staging-grafana
          ansible_connection: docker
          ansible_user: root
          container_image: grafana/grafana
          container_tag: latest
          container_network: devops-practice-monitoring
          container_ports:
            - "3001:3000"
          health_check_url: http://localhost:3001/api/health
          
        staging-prometheus-01:
          ansible_host: staging-prometheus
          ansible_connection: docker
          ansible_user: nobody
          container_image: prom/prometheus
          container_tag: latest
          container_network: devops-practice-monitoring
          container_ports:
            - "9090:9090"
          health_check_url: http://localhost:9090/-/healthy

  vars:
    environment: staging
    app_replicas: 2
    enable_monitoring: true
    enable_logging: true
    apply_security_hardening: true
    apply_resource_limits: true
    container_memory_limit: "1g"
    container_cpu_limit: "2.0"
    backup_retention_days: 14
    log_retention_days: 30