# Staging environment inventory
all:
  children:
    web_servers:
      hosts:
        staging-web-01:
          ansible_host: staging-web-frontend
          ansible_connection: docker
          ansible_user: root
        staging-web-02:
          ansible_host: staging-web-frontend-2
          ansible_connection: docker
          ansible_user: root
    
    app_servers:
      hosts:
        staging-api-01:
          ansible_host: staging-api-gateway
          ansible_connection: docker
          ansible_user: root
        staging-learning-01:
          ansible_host: staging-learning-service
          ansible_connection: docker
          ansible_user: root
        staging-user-01:
          ansible_host: staging-user-service
          ansible_connection: docker
          ansible_user: root
        staging-lab-01:
          ansible_host: staging-lab-service
          ansible_connection: docker
          ansible_user: root
        staging-assessment-01:
          ansible_host: staging-assessment-service
          ansible_connection: docker
          ansible_user: root
    
    db_servers:
      hosts:
        staging-postgres-01:
          ansible_host: staging-postgres
          ansible_connection: docker
          ansible_user: postgres
        staging-redis-01:
          ansible_host: staging-redis
          ansible_connection: docker
          ansible_user: root
    
    monitoring:
      hosts:
        staging-jenkins-01:
          ansible_host: staging-jenkins
          ansible_connection: docker
          ansible_user: jenkins
        staging-grafana-01:
          ansible_host: staging-grafana
          ansible_connection: docker
          ansible_user: root
        staging-prometheus-01:
          ansible_host: staging-prometheus
          ansible_connection: docker
          ansible_user: nobody

  vars:
    environment: staging
    app_replicas: 2
    enable_monitoring: true
    enable_logging: true