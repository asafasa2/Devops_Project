# Development environment inventory
all:
  children:
    web_servers:
      hosts:
        dev-web-01:
          ansible_host: dev-web-frontend
          ansible_connection: docker
          ansible_user: root
    
    app_servers:
      hosts:
        dev-api-01:
          ansible_host: dev-api-gateway
          ansible_connection: docker
          ansible_user: root
        dev-learning-01:
          ansible_host: dev-learning-service
          ansible_connection: docker
          ansible_user: root
        dev-user-01:
          ansible_host: dev-user-service
          ansible_connection: docker
          ansible_user: root
        dev-lab-01:
          ansible_host: dev-lab-service
          ansible_connection: docker
          ansible_user: root
        dev-assessment-01:
          ansible_host: dev-assessment-service
          ansible_connection: docker
          ansible_user: root
    
    db_servers:
      hosts:
        dev-postgres-01:
          ansible_host: dev-postgres
          ansible_connection: docker
          ansible_user: postgres
        dev-redis-01:
          ansible_host: dev-redis
          ansible_connection: docker
          ansible_user: root
    
    monitoring:
      hosts:
        dev-jenkins-01:
          ansible_host: dev-jenkins
          ansible_connection: docker
          ansible_user: jenkins
        dev-grafana-01:
          ansible_host: dev-grafana
          ansible_connection: docker
          ansible_user: root
        dev-prometheus-01:
          ansible_host: dev-prometheus
          ansible_connection: docker
          ansible_user: nobody

  vars:
    environment: dev
    app_replicas: 1
    enable_monitoring: true
    enable_logging: false