# Production environment inventory
all:
  children:
    web_servers:
      hosts:
        prod-web-01:
          ansible_host: prod-web-frontend
          ansible_connection: docker
          ansible_user: root
        prod-web-02:
          ansible_host: prod-web-frontend-2
          ansible_connection: docker
          ansible_user: root
        prod-web-03:
          ansible_host: prod-web-frontend-3
          ansible_connection: docker
          ansible_user: root
    
    app_servers:
      hosts:
        prod-api-01:
          ansible_host: prod-api-gateway
          ansible_connection: docker
          ansible_user: root
        prod-learning-01:
          ansible_host: prod-learning-service
          ansible_connection: docker
          ansible_user: root
        prod-user-01:
          ansible_host: prod-user-service
          ansible_connection: docker
          ansible_user: root
        prod-lab-01:
          ansible_host: prod-lab-service
          ansible_connection: docker
          ansible_user: root
        prod-assessment-01:
          ansible_host: prod-assessment-service
          ansible_connection: docker
          ansible_user: root
    
    db_servers:
      hosts:
        prod-postgres-01:
          ansible_host: prod-postgres
          ansible_connection: docker
          ansible_user: postgres
        prod-redis-01:
          ansible_host: prod-redis
          ansible_connection: docker
          ansible_user: root
    
    monitoring:
      hosts:
        prod-jenkins-01:
          ansible_host: prod-jenkins
          ansible_connection: docker
          ansible_user: jenkins
        prod-grafana-01:
          ansible_host: prod-grafana
          ansible_connection: docker
          ansible_user: root
        prod-prometheus-01:
          ansible_host: prod-prometheus
          ansible_connection: docker
          ansible_user: nobody

  vars:
    environment: prod
    app_replicas: 3
    enable_monitoring: true
    enable_logging: true