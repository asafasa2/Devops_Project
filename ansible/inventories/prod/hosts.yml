# Production environment inventory
all:
  children:
    web_servers:
      hosts:
        prod-web-01:
          ansible_host: prod-web-frontend-01
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/frontend
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-frontend
          container_ports:
            - "3000:3000"
          health_check_url: http://localhost:3000/health
          
        prod-web-02:
          ansible_host: prod-web-frontend-02
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/frontend
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-frontend
          container_ports:
            - "3001:3000"
          health_check_url: http://localhost:3001/health
    
    app_servers:
      hosts:
        prod-api-01:
          ansible_host: prod-api-gateway-01
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/api-gateway
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-backend
          container_ports:
            - "4000:4000"
          health_check_url: http://localhost:4000/health
          
        prod-api-02:
          ansible_host: prod-api-gateway-02
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/api-gateway
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-backend
          container_ports:
            - "4010:4000"
          health_check_url: http://localhost:4010/health
          
        prod-learning-01:
          ansible_host: prod-learning-service-01
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/learning-service
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-backend
          container_ports:
            - "4001:4001"
          health_check_url: http://localhost:4001/health
          
        prod-learning-02:
          ansible_host: prod-learning-service-02
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/learning-service
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-backend
          container_ports:
            - "4011:4001"
          health_check_url: http://localhost:4011/health
          
        prod-user-01:
          ansible_host: prod-user-service-01
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/user-service
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-backend
          container_ports:
            - "4002:4002"
          health_check_url: http://localhost:4002/health
          
        prod-user-02:
          ansible_host: prod-user-service-02
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/user-service
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-backend
          container_ports:
            - "4012:4002"
          health_check_url: http://localhost:4012/health
          
        prod-lab-01:
          ansible_host: prod-lab-service
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/lab-service
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-backend
          container_ports:
            - "4003:4003"
          health_check_url: http://localhost:4003/health
          
        prod-assessment-01:
          ansible_host: prod-assessment-service
          ansible_connection: docker
          ansible_user: root
          container_image: devops-practice/assessment-service
          container_tag: "{{ app_version | default('latest') }}"
          container_network: devops-practice-backend
          container_ports:
            - "4004:4004"
          health_check_url: http://localhost:4004/health
    
    db_servers:
      hosts:
        prod-postgres-01:
          ansible_host: prod-postgres-primary
          ansible_connection: docker
          ansible_user: postgres
          container_image: postgres
          container_tag: "15-alpine"
          container_network: devops-practice-database
          container_ports:
            - "5432:5432"
          container_env:
            POSTGRES_DB: devops_practice_prod
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: "{{ vault_postgres_password }}"
          backup_volumes:
            - prod-postgres-data
            
        prod-redis-01:
          ansible_host: prod-redis-primary
          ansible_connection: docker
          ansible_user: root
          container_image: redis
          container_tag: "7-alpine"
          container_network: devops-practice-database
          container_ports:
            - "6379:6379"
          backup_volumes:
            - prod-redis-data
    
    monitoring:
      hosts:
        prod-jenkins-01:
          ansible_host: prod-jenkins
          ansible_connection: docker
          ansible_user: jenkins
          container_image: jenkins/jenkins
          container_tag: lts
          container_network: devops-practice-monitoring
          container_ports:
            - "8080:8080"
            - "50000:50000"
          health_check_url: http://localhost:8080/login
          backup_volumes:
            - prod-jenkins-home
          
        prod-grafana-01:
          ansible_host: prod-grafana
          ansible_connection: docker
          ansible_user: root
          container_image: grafana/grafana
          container_tag: latest
          container_network: devops-practice-monitoring
          container_ports:
            - "3001:3000"
          health_check_url: http://localhost:3001/api/health
          
        prod-prometheus-01:
          ansible_host: prod-prometheus
          ansible_connection: docker
          ansible_user: nobody
          container_image: prom/prometheus
          container_tag: latest
          container_network: devops-practice-monitoring
          container_ports:
            - "9090:9090"
          health_check_url: http://localhost:9090/-/healthy

  vars:
    environment: prod
    app_replicas: 2
    enable_monitoring: true
    enable_logging: true
    apply_security_hardening: true
    apply_resource_limits: true
    container_memory_limit: "2g"
    container_cpu_limit: "4.0"
    backup_retention_days: 30
    log_retention_days: 90
    send_notifications: true
    notification_email: "ops-team@company.com"