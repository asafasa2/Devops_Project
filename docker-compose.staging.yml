# Staging environment Docker Compose override
version: '3.8'

services:
  # Database Services with Staging Configuration
  postgres:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staging_password_2024}
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=32MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2MB
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  redis:
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '1.0'
        reservations:
          memory: 128m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Application Services with Staging Configuration
  api-gateway:
    image: devops-practice/api-gateway:${APP_VERSION:-staging}
    environment:
      NODE_ENV: staging
      LOG_LEVEL: info
      NODE_OPTIONS: "--max-old-space-size=256"
    deploy:
      replicas: ${API_GATEWAY_REPLICAS:-2}
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s

  learning-service:
    image: devops-practice/learning-service:${APP_VERSION:-staging}
    environment:
      NODE_ENV: staging
      LOG_LEVEL: info
      NODE_OPTIONS: "--max-old-space-size=256"
    deploy:
      replicas: ${LEARNING_SERVICE_REPLICAS:-2}
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s

  user-service:
    image: devops-practice/user-service:${APP_VERSION:-staging}
    environment:
      FLASK_ENV: staging
      LOG_LEVEL: info
      GUNICORN_WORKERS: 2
      GUNICORN_THREADS: 2
    deploy:
      replicas: ${USER_SERVICE_REPLICAS:-2}
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s

  assessment-service:
    image: devops-practice/assessment-service:${APP_VERSION:-staging}
    environment:
      ENVIRONMENT: staging
      LOG_LEVEL: info
      WORKERS: 2
    deploy:
      replicas: ${ASSESSMENT_SERVICE_REPLICAS:-2}
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s

  lab-service:
    image: devops-practice/lab-service:${APP_VERSION:-staging}
    environment:
      SPRING_PROFILES_ACTIVE: staging
      LOG_LEVEL: info
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    deploy:
      replicas: ${LAB_SERVICE_REPLICAS:-1}
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 60s
        failure_action: rollback
        monitor: 120s

  frontend:
    image: devops-practice/frontend:${APP_VERSION:-staging}
    environment:
      NODE_ENV: production
      REACT_APP_API_URL: https://${DOMAIN_NAME:-staging.localhost}/api
      REACT_APP_ENVIRONMENT: staging
    deploy:
      replicas: ${FRONTEND_REPLICAS:-2}
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s

  # Load Balancer with Staging Configuration
  nginx:
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Monitoring Services with Staging Configuration
  prometheus:
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-staging_admin}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY:-staging_secret_key}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_USERS_ALLOW_ORG_CREATE: false
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_SMTP_ENABLED: ${SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${SMTP_HOST:-}
      GF_SMTP_USER: ${SMTP_USER:-}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  # ELK Stack with Staging Configuration
  elasticsearch:
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=85%
      - cluster.routing.allocation.disk.watermark.high=90%
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 3

  logstash:
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
      - ENVIRONMENT=staging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  kibana:
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=staging-kibana
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  # CI/CD Services
  jenkins:
    environment:
      JAVA_OPTS: >
        -Djenkins.install.runSetupWizard=false
        -Xmx1g
        -XX:+UseG1GC
        -Djava.awt.headless=true
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-staging_admin}
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 1g
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3

  # Additional Monitoring
  alertmanager:
    environment:
      - SMTP_SMARTHOST=${SMTP_HOST:-localhost:587}
      - SMTP_FROM=${SMTP_FROM_ADDRESS:-alerts@staging.localhost}
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  node-exporter:
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
        reservations:
          memory: 32m
          cpus: '0.1'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  cadvisor:
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

# Staging-specific network configuration
networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: staging-app-br
  db-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: staging-db-br
  monitoring-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: staging-mon-br