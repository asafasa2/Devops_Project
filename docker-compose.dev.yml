# Development environment Docker Compose override
version: '3.8'

services:
  # Database Services with Development Configuration
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: dev_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/scripts:/opt/scripts:ro
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
    
  redis:
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.25'

  # Application Services with Development Configuration
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      NODE_OPTIONS: "--inspect=0.0.0.0:9229"
    ports:
      - "4000:4000"
      - "9229:9229"  # Debug port
    volumes:
      - ./services/api-gateway/src:/app/src:ro
      - ./logs:/app/logs
    command: npm run dev

  learning-service:
    build:
      context: ./services/learning-service
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      NODE_OPTIONS: "--inspect=0.0.0.0:9230"
    ports:
      - "4001:4001"
      - "9230:9230"  # Debug port
    volumes:
      - ./services/learning-service/src:/app/src:ro
      - ./content:/app/content:ro
      - ./logs:/app/logs
    command: npm run dev

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
      target: development
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      LOG_LEVEL: debug
    ports:
      - "4002:4002"
    volumes:
      - ./services/user-service:/app:ro
      - ./logs:/app/logs
    command: flask run --host=0.0.0.0 --port=4002 --reload

  assessment-service:
    build:
      context: ./services/assessment-service
      dockerfile: Dockerfile
      target: development
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug
      RELOAD: true
    ports:
      - "4004:4004"
    volumes:
      - ./services/assessment-service:/app:ro
      - ./logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 4004 --reload

  lab-service:
    build:
      context: ./services/lab-service
      dockerfile: Dockerfile
      target: development
    environment:
      SPRING_PROFILES_ACTIVE: development
      LOG_LEVEL: debug
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "4003:4003"
      - "5005:5005"  # Debug port
    volumes:
      - ./services/lab-service/target:/app/target:ro
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - lab_workspaces:/opt/lab-workspaces

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: http://localhost:4000
      REACT_APP_ENVIRONMENT: development
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    ports:
      - "3000:3000"
    volumes:
      - ./services/frontend/src:/app/src:ro
      - ./services/frontend/public:/app/public:ro
      - ./logs:/app/logs
    command: npm start

  # Load Balancer with Development Configuration
  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"

  # Minimal Monitoring for Development
  prometheus:
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'

  grafana:
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: true
      GF_USERS_ALLOW_ORG_CREATE: true
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_LOG_LEVEL: debug
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'

  # Simplified ELK Stack for Development
  elasticsearch:
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - xpack.security.enabled=false
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'

  logstash:
    ports:
      - "5044:5044"
      - "9600:9600"
    environment:
      - "LS_JAVA_OPTS=-Xms128m -Xmx128m"
      - ENVIRONMENT=development
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'

  kibana:
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - LOGGING_LEVEL=debug
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'

  # Development Jenkins
  jenkins:
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false -Xmx512m
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs
      JENKINS_ADMIN_PASSWORD: admin123
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/casc_configs:/var/jenkins_home/casc_configs:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace:ro
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '1.0'

  # Development Tools
  mailhog:
    image: mailhog/mailhog:latest
    container_name: dev-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - app-network
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: dev-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - db-network
    depends_on:
      - postgres
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dev-redis-commander
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - db-network
    depends_on:
      - redis
    restart: unless-stopped

# Development-specific volumes use local bind mounts for easier development
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  jenkins_home:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  elasticsearch_data:
    driver: local
  lab_workspaces:
    driver: local