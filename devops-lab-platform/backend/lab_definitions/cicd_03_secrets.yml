id: cicd_03_secrets
title: "Remove hardcoded secrets from a deploy script"
subject: cicd
difficulty: beginner
estimated_minutes: 20
editor_enabled: true
editor_default_path: /workspace
containers:
  - name: lab-host
    image: devops-lab/cicd-lab:latest
    privileged: false
    environment:
      - LAB_ID=cicd_03
objectives:
  - "Identify hardcoded credentials in a deploy script"
  - "Remove the hardcoded secret from the script"
  - "Load the secret from an environment variable instead"
  - "Verify no secrets remain in the script file"
setup_commands:
  - "mkdir -p /workspace /opt/lab"
  - |
    cat > /workspace/deploy.sh << 'EOF'
    #!/bin/bash
    # Deploy script for the app
    set -e

    DB_HOST="db.internal"
    DB_USER="appuser"
    DB_PASSWORD="password123"
    API_KEY="sk-prod-abc123xyz789secret"

    echo "Connecting to database at $DB_HOST..."
    echo "Authenticating with user $DB_USER..."

    if [ -z "$DB_PASSWORD" ]; then
        echo "ERROR: DB_PASSWORD not set"
        exit 1
    fi

    echo "Running database migrations..."
    echo "Migration complete"

    if [ -z "$API_KEY" ]; then
        echo "ERROR: API_KEY not set"
        exit 1
    fi

    echo "Calling API with key: ${API_KEY:0:8}..."
    echo "Deploy complete!"
    EOF
  - "chmod +x /workspace/deploy.sh"
  - |
    cat > /opt/lab/secrets-get << 'EOF'
    #!/bin/bash
    # Simulated secrets manager. Returns a secret by name.
    case "$1" in
      DB_PASSWORD) echo "password123" ;;
      API_KEY)     echo "sk-prod-abc123xyz789secret" ;;
      *)           echo "ERROR: unknown secret $1" >&2; exit 1 ;;
    esac
    EOF
  - "chmod +x /opt/lab/secrets-get"
  - "export DB_PASSWORD=$(/opt/lab/secrets-get DB_PASSWORD)"
  - "export API_KEY=$(/opt/lab/secrets-get API_KEY)"
validation_steps:
  - command: "grep -rE 'password123|sk-prod-abc123' /workspace/"
    expected_exit: 1
    hint: "Hardcoded secrets still found in /workspace/. Remove the literal values from deploy.sh and load them via environment variables instead."
  - command: "DB_PASSWORD=$(/opt/lab/secrets-get DB_PASSWORD) API_KEY=$(/opt/lab/secrets-get API_KEY) bash /workspace/deploy.sh"
    expected_exit: 0
    hint: "deploy.sh fails when run with secrets loaded from the secrets manager. Check the logic — the script should read DB_PASSWORD and API_KEY from environment variables."
instructions: |
  ## Your mission: Remove hardcoded secrets

  The deploy script has credentials hardcoded directly in the file.
  **Hardcoded secrets are a critical security risk** — they end up in git history,
  CI logs, and anyone with file access can read them.

  ### Step 1 — Find the secrets
  ```
  cat /workspace/deploy.sh
  ```

  Look for lines like:
  ```bash
  DB_PASSWORD="password123"     ← BAD: hardcoded
  API_KEY="sk-prod-abc123..."   ← BAD: hardcoded
  ```

  ### Step 2 — Fix the script

  Remove the hardcoded values. The variables should read from the environment:
  ```bash
  # Remove these lines entirely:
  # DB_PASSWORD="password123"
  # API_KEY="sk-prod-abc123xyz789secret"

  # The script already checks if they're set:
  if [ -z "$DB_PASSWORD" ]; then
      echo "ERROR: DB_PASSWORD not set"
      exit 1
  fi
  ```

  Edit the file:
  ```
  nano /workspace/deploy.sh
  ```

  ### Step 3 — Load secrets from the secrets manager

  A secrets manager is available at `/opt/lab/secrets-get`:
  ```bash
  export DB_PASSWORD=$(/opt/lab/secrets-get DB_PASSWORD)
  export API_KEY=$(/opt/lab/secrets-get API_KEY)
  ```

  ### Step 4 — Run the fixed script
  ```
  export DB_PASSWORD=$(/opt/lab/secrets-get DB_PASSWORD)
  export API_KEY=$(/opt/lab/secrets-get API_KEY)
  bash /workspace/deploy.sh
  ```

  ### Step 5 — Confirm no secrets in the file
  ```
  grep -i 'password\|secret\|key' /workspace/deploy.sh
  ```

  Only variable references (`$DB_PASSWORD`) should appear, not literal values.

  Once the script runs cleanly and no secrets are hardcoded, click **Validate**.
