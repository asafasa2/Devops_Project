id: security_02_firewall
title: "Configure nftables firewall for a web server"
subject: security
difficulty: intermediate
estimated_minutes: 30
containers:
  - name: lab-host
    image: devops-lab/security-lab:latest
    privileged: true
    environment:
      - LAB_ID=sec_02
objectives:
  - "Create an nftables table and chain for input filtering"
  - "Allow SSH (port 22), HTTP (80), and HTTPS (443)"
  - "Allow established/related connections"
  - "Allow loopback traffic"
  - "Drop all other incoming traffic"
setup_commands:
  - |
    # Clear any existing rules
    nft flush ruleset 2>/dev/null || true
  - "systemctl restart nginx || true"
validation_steps:
  - command: "nft list ruleset | grep -q 'table inet filter'"
    expected_exit: 0
    hint: "Create an nftables table: nft add table inet filter"
  - command: "nft list ruleset | grep -q 'chain input'"
    expected_exit: 0
    hint: "Create an input chain: nft add chain inet filter input '{ type filter hook input priority 0; policy drop; }'"
  - command: "nft list ruleset | grep -q 'dport 22'"
    expected_exit: 0
    hint: "Add a rule to accept SSH: nft add rule inet filter input tcp dport 22 accept"
  - command: "nft list ruleset | grep -q 'dport 80'"
    expected_exit: 0
    hint: "Add a rule to accept HTTP: nft add rule inet filter input tcp dport 80 accept"
  - command: "nft list ruleset | grep -q 'dport 443'"
    expected_exit: 0
    hint: "Add a rule to accept HTTPS: nft add rule inet filter input tcp dport 443 accept"
  - command: "nft list ruleset | grep -qi 'established\\|related\\|ct state'"
    expected_exit: 0
    hint: "Add a rule for established connections: nft add rule inet filter input ct state established,related accept"
  - command: "curl -s -o /dev/null -w '%{http_code}' http://localhost | grep -q '200'"
    expected_exit: 0
    hint: "nginx on port 80 should still be reachable after applying the firewall rules."
instructions: |
  ## Your mission: Configure an nftables firewall

  The server has no firewall rules — all ports are open. Set up nftables
  to only allow essential services.

  ### Step 1 — Check current state
  ```
  nft list ruleset           # should be empty
  ss -tlnp                   # see what's listening
  ```

  ### Step 2 — Create the table and chain
  ```
  nft add table inet filter
  nft add chain inet filter input '{ type filter hook input priority 0; policy drop; }'
  ```

  The `policy drop` means anything not explicitly allowed is blocked.

  ### Step 3 — Allow essential traffic

  **Loopback (always allow):**
  ```
  nft add rule inet filter input iif lo accept
  ```

  **Established connections (replies to outgoing requests):**
  ```
  nft add rule inet filter input ct state established,related accept
  ```

  **SSH, HTTP, HTTPS:**
  ```
  nft add rule inet filter input tcp dport 22 accept
  nft add rule inet filter input tcp dport 80 accept
  nft add rule inet filter input tcp dport 443 accept
  ```

  ### Step 4 — Verify
  ```
  nft list ruleset
  curl http://localhost       # should work (port 80 allowed)
  ```

  ### Step 5 — (Optional) Save rules
  ```
  nft list ruleset > /etc/nftables.conf
  ```

  **Why nftables over iptables:**
  - nftables is the modern replacement for iptables in Linux
  - Single framework for IPv4, IPv6, ARP filtering
  - Cleaner syntax, better performance with rulesets
  - Default in Debian 10+, RHEL 8+, Ubuntu 20.04+

  Once all rules are in place, click **Validate**.
