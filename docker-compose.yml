# Base Docker Compose configuration for DevOps Practice Environment
version: '3.8'

services:
  # Database Services
  postgres:
    image: postgres:15-alpine
    container_name: ${ENVIRONMENT:-dev}-postgres
    environment:
      POSTGRES_DB: devops_practice
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - app-network
      - db-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops_user -d devops_practice"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ${ENVIRONMENT:-dev}-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-network
      - db-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Load Balancer
  nginx:
    image: nginx:alpine
    container_name: ${ENVIRONMENT:-dev}-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - app-network
    depends_on:
      - api-gateway
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  db-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  postgres_data:
    name: ${ENVIRONMENT:-dev}-postgres-data
  redis_data:
    name: ${ENVIRONMENT:-dev}-redis-data
  jenkins_home:
    name: ${ENVIRONMENT:-dev}-jenkins-home
  grafana_data:
    name: ${ENVIRONMENT:-dev}-grafana-data
  prometheus_data:
    name: ${ENVIRONMENT:-dev}-prometheus-data
  elasticsearch_data:
    name: ${ENVIRONMENT:-dev}-elasticsearch-data