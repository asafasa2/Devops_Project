# Production environment Docker Compose override
version: '3.8'

services:
  # Database Services with Production Configuration
  postgres:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_parallel_maintenance_workers=4
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2g
          cpus: '4.0'
        reservations:
          memory: 1g
          cpus: '2.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  redis:
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512m
          cpus: '2.0'
        reservations:
          memory: 256m
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Application Services with Production Scaling
  api-gateway:
    image: devops-practice/api-gateway:${APP_VERSION:-latest}
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      replicas: ${API_GATEWAY_REPLICAS:-3}
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 0s
        failure_action: pause
        monitor: 60s
        max_failure_ratio: 0.3

  learning-service:
    image: devops-practice/learning-service:${APP_VERSION:-latest}
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      replicas: ${LEARNING_SERVICE_REPLICAS:-2}
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3

  user-service:
    image: devops-practice/user-service:${APP_VERSION:-latest}
    environment:
      FLASK_ENV: production
      LOG_LEVEL: warn
      GUNICORN_WORKERS: 4
      GUNICORN_THREADS: 2
    deploy:
      replicas: ${USER_SERVICE_REPLICAS:-2}
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3

  assessment-service:
    image: devops-practice/assessment-service:${APP_VERSION:-latest}
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: warn
      WORKERS: 4
    deploy:
      replicas: ${ASSESSMENT_SERVICE_REPLICAS:-2}
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3

  lab-service:
    image: devops-practice/lab-service:${APP_VERSION:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: production
      LOG_LEVEL: warn
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    deploy:
      replicas: ${LAB_SERVICE_REPLICAS:-1}
      resources:
        limits:
          memory: 2g
          cpus: '4.0'
        reservations:
          memory: 1g
          cpus: '2.0'
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 3
        window: 180s
      update_config:
        parallelism: 1
        delay: 60s
        failure_action: rollback
        monitor: 120s
        max_failure_ratio: 0.1

  frontend:
    image: devops-practice/frontend:${APP_VERSION:-latest}
    environment:
      NODE_ENV: production
      REACT_APP_API_URL: https://${DOMAIN_NAME:-localhost}/api
      REACT_APP_ENVIRONMENT: production
    deploy:
      replicas: ${FRONTEND_REPLICAS:-2}
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 2
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3

  # Load Balancer with SSL and Production Configuration
  nginx:
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256m
          cpus: '1.0'
        reservations:
          memory: 128m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s

  # Monitoring Services with Production Configuration
  prometheus:
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.external-url=https://${DOMAIN_NAME:-localhost}/prometheus'
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 1g
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_USERS_ALLOW_ORG_CREATE: false
      GF_USERS_AUTO_ASSIGN_ORG: true
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: https://${DOMAIN_NAME:-localhost}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: true
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
      GF_SMTP_ENABLED: ${SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${SMTP_HOST:-}
      GF_SMTP_USER: ${SMTP_USER:-}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  # ELK Stack with Production Configuration
  elasticsearch:
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 1g
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 3
        window: 180s

  logstash:
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - ENVIRONMENT=production
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  kibana:
    environment:
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  # CI/CD Services
  jenkins:
    environment:
      JAVA_OPTS: >
        -Djenkins.install.runSetupWizard=false
        -Xmx2g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -Djava.awt.headless=true
        -Djenkins.security.ApiTokenProperty.adminCanGenerateNewTokens=true
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      JENKINS_OPTS: "--sessionTimeout=1440"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4g
          cpus: '4.0'
        reservations:
          memory: 2g
          cpus: '2.0'
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
        window: 300s

# Production-specific volumes
volumes:
  nginx_cache:
    name: prod-nginx-cache
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/nginx-cache

# Production network configuration
networks:
  app-network:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
  db-network:
    driver: overlay
    attachable: false
    driver_opts:
      encrypted: "true"
  monitoring-network:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"