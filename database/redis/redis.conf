# Redis configuration for DevOps Practice Environment
# This configuration is optimized for development and learning purposes

# Network settings
bind 0.0.0.0
port 6379
protected-mode no

# General settings
daemonize no
supervised no
pidfile /var/run/redis_6379.pid

# Logging
loglevel notice
logfile ""

# Persistence settings
save 900 1
save 300 10
save 60 10000

# Enable AOF persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory settings
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security settings (for development)
# requirepass dev_redis_password_2024

# Client settings
timeout 300
tcp-keepalive 300

# Database settings
databases 16

# Slow log settings
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# Session management settings (for learning platform)
# Database 0: User sessions
# Database 1: Learning progress cache
# Database 2: Lab environment cache
# Database 3: Assessment cache